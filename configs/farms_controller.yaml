# farms_config.yaml - Control parameters for the FARMS centipede model
# Edit this file to change locomotion parameters; no code changes needed.

# Body travelling wave
body_wave:
  amplitude:    0.4
  frequency:    1.0
  wave_number:  3.0
  speed:        1.0
  # Head-end spatial amplitude envelope (body yaw only).
  #   head_hold_joints = 1 -> only joint 0 (the world-heading servo) is held
  #   head_ramp_joints = 2 -> joints 1,2 cosine taper from amin up to 1
  #   With amin=0, R=2 produces scales ~ [0.25, 0.75] at i=1,2.
  #   Joint 3 now gets full wave amplitude (was tapered before).
  head_hold_joints: 1
  head_ramp_joints: 2
  head_ramp_min:    0.0

# Leg wave
leg_wave:
  amplitudes:     [0.6, 0.2, 0.0, 0.0]
  phase_offsets:  [-1.5707963, 3.1415926, 0.0, 3.1415926]
  dc_offsets:     [0.0, 0.0, 0.0, 0.5235987755982988]
  active_dofs:    [0, 1]

# CPG oscillator network (Kuramoto chain).
# Softer (|Omega| smaller) -> slower relaxation, visible follow-the-leader.
# Was -5.0; lowered to -2.5 so each segment clearly chases the one ahead.
cpg:
  enabled:            true
  coupling_omega:     -2.5
  leg_coupling_omega: -2.5

# Simulation
simulation:
  duration:     10.0
  timestep:     0.0005

# Impedance control.
#   - body_kp_head / body_kv_head drive the heading-servo joint 0 (large gains
#     because all downstream joints entrain to joint 0 via the CPG).
#   - body_kp / body_kv are the normal per-segment impedance for joints 1..18.
#   - pitch_* softer (halved) so transition joints (former passive 3,7,11,15)
#     don't overshoot.
#   - roll_* soft: roll now has its own <general> actuators (20 of them) added
#     in centipede.xml, so these gains are no longer dead code.
#   - head_yaw_gain maps world yaw error (rad) of link_body_0 to a q_target
#     on joint_body_1.  ~1.0 is a good starting point.
impedance:
  # Updated 2026-04-24 from Bayesian optimizer v3 (rough terrain wl18, 12-D).
  # Cost function was straightness-dominated with a pitch-compliance reward;
  # search space added pitch_kp/kv and tibia/tarsus kp/kv on top of the
  # original 6 body+hip params.  Body yaw softened further (0.0272 -> 0.0179)
  # for terrain compliance.  Body is intentionally underdamped — body_kp is
  # what we sweep next.
  body_kp:        0.047915648750902756    # 2026-04-27: bumped +0.01 from 0.017915 — slightly stiffer body
  body_kv:        0.012269819351813625
  body_kp_head:   2.0
  body_kv_head:   0.20
  head_yaw_gain:  1.0
  # Max |q_target| (rad) on joint_body_1 from the heading servo. Hinge range
  # is ±0.628 rad, so 0.5 leaves headroom before the joint limit. Raise if the
  # circle trajectory lacks steering authority; lower if the head chatters
  # against the clamp.
  head_yaw_target_clip: 0.5
  # Circle trajectory: rate (rad/s) at which head_yaw_ref rotates after settle.
  # 0 -> straight line (default). Negative -> clockwise (yaw decreasing).
  # For a circle of radius R at forward speed v: head_yaw_rate = v/R.
  head_yaw_rate:  0.0
  # Pitch tuning from rough-terrain optimizer.  pitch_kv driven to floor
  # (~4e-5) and pitch_kp barely moved — gives nearly-undamped, compliant
  # pitch joints so the body drapes over terrain.  pitch_kp is the second
  # knob we'll sweep next.
  pitch_kp:       0.01453705868445866
  pitch_kv:       0.00004102431399331478
  # Active head pitch-up target (rad). Negative q on axis (0,1,0) pitches the
  # nose UP in the FARMS MJCF convention (verified visually 2026-04). Flip
  # sign if your MJCF uses the opposite convention. ~|0.25| rad ≈ 14 deg.
  # This target is now cosine-ramped with the same settle+ramp profile used
  # for the body wave, so there is no startup torque step.
  head_pitch_offset: -0.25
  head_pitch_joints: 1
  # Stiffer gains on the head pitch joint(s) so they hold the offset target
  # against gravity.  ~5× the global pitch gains (base is now stiffer at 0.04).
  head_pitch_kp:     0.20
  head_pitch_kv:     0.05
  roll_kp:        0.004
  roll_kv:        0.0016
  settle_time:    1.0
  ramp_time:      1.0
  leg:
    # Updated 2026-04-24 from Bayesian optimizer v3 (rough wl18, 12-D).
    #   Inverted from the flat-ground winner: legs are MUCH softer in kp
    #   and the distal joints (tibia/tarsus) gained heavy damping.
    #
    #   hip_yaw   (DOF 0): kp 0.558  -> 0.0326   (17x SOFTER)  | kv 0.000650 -> 0.000452
    #   hip_pitch (DOF 1): kp 0.0587 -> 0.00886  (6.6x SOFTER) | kv 0.00264   -> 0.000147
    #   tibia     (DOF 2): kp 0.127  -> 0.0572   (2.2x softer) | kv 4.36e-5   -> 0.00442  (101x more damped)
    #   tarsus    (DOF 3): kp 0.127  -> 0.1064   (similar)     | kv 0.000910  -> 0.00546  (6x more damped)
    #
    # Architecture: soft proximal joints (let body conform to terrain),
    # well-damped distal joints (kill foot ringing on ground contact).
    kp: [0.0325748618494269,    0.008862678204519891, 0.057191322069614206, 0.1063669821713091]
    kv: [0.00045210699849367367, 0.00014673695171707596, 0.004417111611561173, 0.005463954516638024]

# Recording
recording:
  dt_record:    0.01
