# farms_config.yaml - Control parameters for the FARMS centipede model
# Edit this file to change locomotion parameters; no code changes needed.

# Body travelling wave
body_wave:
  amplitude:    0.4
  frequency:    1.0
  wave_number:  3.0
  speed:        1.0
  # Head-end spatial amplitude envelope (body yaw only).
  #   head_hold_joints = 1 -> only joint 0 (the world-heading servo) is held
  #   head_ramp_joints = 2 -> joints 1,2 cosine taper from amin up to 1
  #   With amin=0, R=2 produces scales ~ [0.25, 0.75] at i=1,2.
  #   Joint 3 now gets full wave amplitude (was tapered before).
  head_hold_joints: 1
  head_ramp_joints: 2
  head_ramp_min:    0.0

# Leg wave
leg_wave:
  amplitudes:     [0.6, 0.2, 0.0, 0.0]
  phase_offsets:  [-1.5707963, 3.1415926, 0.0, 3.1415926]
  dc_offsets:     [0.0, 0.0, 0.0, 0.5235987755982988]
  active_dofs:    [0, 1]

# CPG oscillator network (Kuramoto chain).
# Softer (|Omega| smaller) -> slower relaxation, visible follow-the-leader.
# Was -5.0; lowered to -2.5 so each segment clearly chases the one ahead.
cpg:
  enabled:            true
  coupling_omega:     -2.5
  leg_coupling_omega: -2.5

# Simulation
simulation:
  duration:     10.0
  timestep:     0.0005

# Impedance control.
#   - body_kp_head / body_kv_head drive the heading-servo joint 0 (large gains
#     because all downstream joints entrain to joint 0 via the CPG).
#   - body_kp / body_kv are the normal per-segment impedance for joints 1..18.
#   - pitch_* softer (halved) so transition joints (former passive 3,7,11,15)
#     don't overshoot.
#   - roll_* soft: roll now has its own <general> actuators (20 of them) added
#     in centipede.xml, so these gains are no longer dead code.
#   - head_yaw_gain maps world yaw error (rad) of link_body_0 to a q_target
#     on joint_body_1.  ~1.0 is a good starting point.
impedance:
  # Updated 2026-05-06 — adopting Isaac Lab three_eval_v1 rank 5 (trial #167)
  # gain set for cross-simulator comparison. The MuJoCo three-eval optimizer's
  # own winner (trial #92, cost=19.21) collapsed to a passive-walk basin
  # (body_kp ≈ 2.7e-4, hip_yaw_kp at the search-bound floor) — see
  # farms_controller.yaml.backup_v3_20260506 for the previous v3 values, and
  # outputs/optimization/impedance_three_eval_three_eval_v1_20260505_152259/
  # best_params.yaml for trial #92's full state.
  # Architecture (Isaac Lab rank 5): medium body + active hip + very soft
  # tibia + moderate tarsus. Reported by Isaac Lab on its terrain:
  #   flat 2Hz:        speed=90.0 mm/s = 0.88 BL/s,  CoT=21.49 J/m
  #   rough λ18 1Hz:   speed=23.6 mm/s,              CoT= 7.75 J/m
  #   rough λ18 2Hz:   speed=49.6 mm/s,              CoT=39.04 J/m
  # Cross-sim test: validate whether this PhysX-discovered architecture
  # also walks under MuJoCo's contact solver.
  body_kp:        0.14396435461660606
  body_kv:        0.003710391030836182
  body_kp_head:   2.0
  body_kv_head:   0.20
  head_yaw_gain:  1.0
  head_yaw_target_clip: 0.5
  head_yaw_rate:  0.0
  # pitch_kp / pitch_kv kept from the v3 backup (2026-04-24) because Isaac
  # Lab's rank-5 pitch_kp=0.00715 is too soft for MuJoCo — body sagged
  # visibly. v3 values are ~2× stiffer in pitch_kp; pitch_kv is similar.
  pitch_kp:       0.01453705868445866
  pitch_kv:       0.00004102431399331478
  head_pitch_offset: -0.25
  head_pitch_joints: 1
  head_pitch_kp:     0.20
  head_pitch_kv:     0.05
  roll_kp:        0.004
  roll_kv:        0.0016
  settle_time:    1.0
  ramp_time:      1.0
  leg:
    # Isaac Lab three_eval rank 5 (trial #167) leg gains:
    #   hip_yaw   (DOF 0): kp 0.0762   kv 1.22e-05  (active drive, lightly damped)
    #   hip_pitch (DOF 1): kp 0.1041   kv 3.74e-08  (essentially undamped)
    #   tibia     (DOF 2): kp 0.00149  kv 1.61e-07  (VERY SOFT, near-undamped)
    #   tarsus    (DOF 3): kp 0.1419   kv 3.55e-03  (moderate foot-tip damping)
    kp: [0.0762341873055933,   0.10410070483808535, 0.0014869886879781957, 0.14185816765501905]
    kv: [1.2233473366963375e-05, 3.7409077982351254e-08, 1.6068234215749776e-07, 0.0035528652774281773]

# Recording
recording:
  dt_record:    0.01
