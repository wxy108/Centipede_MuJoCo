# farms_config.yaml — Control parameters for the FARMS centipede model
# Edit this file to change locomotion parameters; no code changes needed.
# Values sourced from animat.yaml (Base_exp) via extract_animat_params.py

# ── Body travelling wave ──────────────────────────────────────────────────────
body_wave:
  amplitude:    0.6       # rad — peak body yaw angle
  frequency:    1.0       # Hz  — locomotion frequency (start low for stability)
  wave_number:  3.0       # spatial waves along body (n_wave)
  speed:        1.0       # wave speed multiplier (1.0 = normal)
  # FARMS original: frequency=6 Hz, wave_number=5
  # Reduced here for initial stability testing; increase gradually

# ── Leg wave ─────────────────────────────────────────────────────────────────
leg_wave:
  # Per-DOF amplitudes [DOF0, DOF1, DOF2, DOF3]
  # DOF0 = hip yaw, DOF1 = hip pitch (elevation), DOF2/3 ≈ 0 in FARMS
  amplitudes:     [0.6, 0.3, 0.0, 0.0]

  # Per-DOF phase offsets relative to body wave [rad]
  # DOF0: -π/2 → leg leads body by 90° (cosine coupling)
  # DOF1:  π   → antiphase to body (leg up when body bends)
  phase_offsets:  [-1.5707963, 3.1415926, 0.0, 3.1415926]

  # DC offsets added to each DOF (zero = symmetric swing)
  dc_offsets:     [0.0, 0.0, 0.0, 0.5235987755982988]

  # Which DOFs are actively driven (others held at dc_offset)
  active_dofs:    [0, 1]

# ── Simulation ───────────────────────────────────────────────────────────────
simulation:
  duration:     10.0    # seconds
  timestep:     0.0005  # must match <option timestep="0.0005"> in centipede.xml

# ── Recording ────────────────────────────────────────────────────────────────
# ── Impedance control (body yaw) ─────────────────────────────────────────────
# Used by ImpedanceTravelingWaveController (replaces stiff position control).
# Body yaw actuators must be <general> type (see add_compliance.py).
impedance:
  body_kp:      0.05    # yaw (prev × 0.8)
  body_kv:      0.01    # yaw (prev × 0.8)
  pitch_kp:     0.0017385 # pitch (prev × 0.5, best from gain sweep)
  pitch_kv:     0.000457  # pitch (prev × 0.5, best from gain sweep)
  roll_kp:      0.004   # roll (prev × 0.8)
  roll_kv:      0.0016  # roll (prev × 0.8)
  settle_time:  1.0    # seconds — hold neutral before gait starts
  ramp_time:    1.0    # seconds — smooth cosine ramp from 0 to full gait amplitude
  # Leg impedance gains — per-DOF [hip_yaw, hip_pitch, tibia, tarsus]
  # All × 0.8 from previous
  leg:
    kp: [0.1270, 0.0147, 0.1270, 0.1270]
    kv: [0.00056, 0.000114, 0.0000436, 0.000910]

# ── Joint control summary ────────────────────────────────────────────────────
# Pitch (joint_pitch_body_0..19): impedance + online grav comp
#   Indices 3,7,11,15 are transition joints between body modules
#   XML springs zeroed, controlled by pitch_kp/pitch_kv in impedance section
# Body roll (joint_roll_body_0..19): impedance + grav comp
#   XML springs zeroed, controlled by roll_kp/roll_kv in impedance section
# Leg roll (joint_roll_leg_N_L/R): passive springs in XML (stiffness=5e-2)
# Body yaw (joint_body_N): impedance, controlled by body_kp/body_kv

recording:
  dt_record:    0.01    # seconds between saved frames
