# farms_config.yaml - Control parameters for the FARMS centipede model
# Edit this file to change locomotion parameters; no code changes needed.

# Body travelling wave
body_wave:
  amplitude:    0.6
  frequency:    1.0
  wave_number:  3.0
  speed:        1.0
  # Head-end spatial amplitude envelope (body yaw only).
  #   head_hold_joints = 1 -> only joint 0 (the world-heading servo) is held
  #   head_ramp_joints = 3 -> joints 1,2,3 cosine taper from amin up to 1
  #   With amin=0, R=3 produces scales ~ [0.146, 0.500, 0.854] at i=1,2,3.
  head_hold_joints: 1
  head_ramp_joints: 3
  head_ramp_min:    0.0

# Leg wave
leg_wave:
  amplitudes:     [0.6, 0.2, 0.0, 0.0]
  phase_offsets:  [-1.5707963, 3.1415926, 0.0, 3.1415926]
  dc_offsets:     [0.0, 0.0, 0.0, 0.5235987755982988]
  active_dofs:    [0, 1]

# CPG oscillator network (Kuramoto chain).
# Softer (|Omega| smaller) -> slower relaxation, visible follow-the-leader.
# Was -5.0; lowered to -2.5 so each segment clearly chases the one ahead.
cpg:
  enabled:            true
  coupling_omega:     -2.5
  leg_coupling_omega: -2.5

# Simulation
simulation:
  duration:     10.0
  timestep:     0.0005

# Impedance control.
#   - body_kp_head / body_kv_head drive the heading-servo joint 0 (large gains
#     because all downstream joints entrain to joint 0 via the CPG).
#   - body_kp / body_kv are the normal per-segment impedance for joints 1..18.
#   - pitch_* softer (halved) so transition joints (former passive 3,7,11,15)
#     don't overshoot.
#   - roll_* soft: roll now has its own <general> actuators (20 of them) added
#     in centipede.xml, so these gains are no longer dead code.
#   - head_yaw_gain maps world yaw error (rad) of link_body_0 to a q_target
#     on joint_body_1.  ~1.0 is a good starting point.
impedance:
  body_kp:        0.05
  body_kv:        0.01
  body_kp_head:   2.0
  body_kv_head:   0.20
  head_yaw_gain:  1.0
  pitch_kp:       0.0087
  pitch_kv:       0.0023
  roll_kp:        0.003
  roll_kv:        0.0012
  settle_time:    1.0
  ramp_time:      1.0
  leg:
    kp: [0.1270, 0.0147, 0.1270, 0.1270]
    kv: [0.00056, 0.000114, 0.0000436, 0.000910]

# Recording
recording:
  dt_record:    0.01
