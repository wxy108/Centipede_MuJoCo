# ═══════════════════════════════════════════════════════════════════════════════
# Centipede MuJoCo Controller Configuration
# ═══════════════════════════════════════════════════════════════════════════════
#
# All wave parameters that define the feedforward traveling-wave locomotion.
# The controller reads this file at startup; edit values here, re-run.
#
# Phase convention (matches FARMS & analytical stride model):
#   body:  A_body * sin(ω*t - k*i)
#   leg:   A_leg  * sin(ω*t - k*i + phase_offset_per_dof)
#   right side = negated left side (antiphase)
#
# Where:
#   ω = 2π * frequency               temporal angular frequency
#   k = 2π * wave_number / (N-1)     spatial phase step per body joint index
#   N = n_body_joints (19 walking segments by default)
#   i = segment index (0-based, head-to-tail)
# ═══════════════════════════════════════════════════════════════════════════════

# ─── Simulation ───
simulation:
  timestep: 0.0005          # MuJoCo timestep (must match XML <option timestep>)
  duration: 10.0            # Default run duration (seconds)
  record_interval: 0.01     # Data recording interval (seconds)

# ─── Body wave ───
body_wave:
  amplitude: 0.5            # Body joint amplitude A_body (rad)
  frequency: 2.0            # Temporal frequency f (Hz), shared by body and legs
  wave_number: 3.0          # Number of spatial waves along the backbone (n)
  speed: 1.0                # Wave speed multiplier (1.0 = standard traveling wave)

# ─── Leg wave ───
# Each leg DOF gets its own amplitude, phase offset, and DC offset.
# Arrays are indexed by DOF: [0] = yaw, [1] = upper pitch, [2] = lower pitch.
#
# Coupling: all leg DOFs share the SAME temporal frequency and spatial wave
# number as the body. The per-DOF phase_offset shifts the leg oscillation
# relative to the body wave at that segment.
#
# Phase offsets from FARMS convention:
#   DOF 0 (yaw):         -π/2  → cos coupling (π/2 lead over body sine)
#   DOF 1 (upper pitch):  π    → antiphase to body
#   DOF 2 (lower pitch):  0    → in-phase with body (or set amplitude=0 to disable)
leg_wave:
  amplitudes:     [0.6,  0.4,  0.0]      # [yaw, upper_pitch, lower_pitch] (rad)
  phase_offsets:  [-1.5707963, 3.1415926, 0.0]  # [yaw, upper_pitch, lower_pitch] (rad)
  dc_offsets:     [0.0,  0.0,  0.0]      # Constant bias per DOF (rad)
  active_dofs:    [0, 1]                  # Which DOFs receive the wave (others held at dc_offset)

# ─── Duty factor (optional, 0 = disabled) ───
# When > 0, replaces the sinusoidal leg waveform with an asymmetric
# stance/swing waveform. 0.5 = symmetric, >0.5 = longer stance.
duty_factor: 0.0

# ─── Number of body joints in wave ───
# Normally 19 (the 19 walking segments). Joint jb20 connects to the
# legless terminal segment and can be excluded.
n_body_joints_wave: 19

# ─── Appendages ───
# Antennae, forcipules, mandibles: rest angle + random oscillation.
# Mimics biological exploratory / feeding movements.
appendages:
  antenna:
    # Rest angles (rad). L yaw negative = point forward-left, R positive = forward-right.
    rest_yaw_L: -0.78          # ~-45 deg, antenna points forward-left
    rest_yaw_R:  0.78          # ~+45 deg, antenna points forward-right
    rest_pitch_L: -0.27        # slight downward
    rest_pitch_R: -0.31        # slight downward
    # Random oscillation (Ornstein-Uhlenbeck process)
    noise_amp: 0.1             # amplitude of random wandering (rad)
    noise_freq: 0.1            # characteristic frequency (Hz), higher = faster twitching
  forcipule:
    rest_L: 0.09
    rest_R: 0.01
    noise_amp: 0.05            # small twitching
    noise_freq: 1.5
  mandible:
    rest_L: -0.015
    rest_R: -0.03
    noise_amp: 0.03            # very small
    noise_freq: 1.0
