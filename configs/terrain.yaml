# ═══════════════════════════════════════════════════════════════════════════════
# Terrain Configuration — Morphology-Driven Exact Wavelength Bands
# ═══════════════════════════════════════════════════════════════════════════════
#
# Four spectral bands, each at EXACTLY the robot's characteristic wavelength:
#   World   → λ = L_w (arena half-extent)     — base terrain shape
#   Body    → λ = L_b (body length)            — whole-body interaction
#   Segment → λ = L_s = L_b / n_wave           — body-wave segment scale
#   Leg     → λ = L_ℓ (leg length)             — foothold geometry
#
# To adapt to a different robot: change ONLY the morphology section.
#
# ═══════════════════════════════════════════════════════════════════════════════

# ── Robot morphology ─────────────────────────────────────────────────────────
# Change ONLY this section when switching to a different robot model.
morphology:
  L_b:     0.1025    # Total body length (m) — head to tail
  n_wave:  3         # Traveling wave number → L_s = L_b / n_wave
  L_ell:   0.0074    # Leg length (m) — hip to foot tip

# ── World setup ──────────────────────────────────────────────────────────────
world:
  size:                 0.5     # Half-extent (m). Total arena = 1m × 1m
  image_size:           1024    # Pixels per side
  terrain_world_height: 0.05   # Encoding range (m)
  smooth_sigma:         1.5     # Gaussian blur in pixels (~1.5mm). Must be < L_ell/4 to preserve leg features.

centering:
  enabled:          false

# ── Spectral bands ───────────────────────────────────────────────────────────
# Each band generates terrain at EXACTLY its characteristic wavelength.
# Amplitudes are defaults — override via CLI:
#   --world-amp, --body-amp, --segment-amp, --leg-amp

spectral_bands:

  world:
    # λ = L_w = world.size (arena half-extent = 500mm)
    # Generates broad base terrain shape — slopes, large undulations
    anchor: "L_w"
    n_components:        4
    amplitude:           0.006
    orientation_spread:  1.0

  body:
    # λ = L_b = 102.5mm (total body length)
    # Terrain features at body scale — whole-body pitch/roll
    anchor: "L_b"
    n_components:        6
    amplitude:           0.003
    orientation_spread:  1.0

  segment:
    # λ = L_s = L_b / n_wave = 34.2mm (body-wave segment scale)
    # Terrain features at segment scale — inter-segment bending
    anchor: "L_s"
    n_components:        8
    amplitude:           0.002
    orientation_spread:  1.0

  leg:
    # λ = L_ℓ = 7.4mm (leg length)
    # Terrain features at leg scale — foothold geometry, contact timing
    anchor: "L_ell"
    n_components:        12
    amplitude:           0.001
    orientation_spread:  1.0
